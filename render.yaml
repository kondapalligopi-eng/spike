databases:
  - name: petdogs-db
    databaseName: petdogs
    user: petdogs
    plan: free

services:
  # -------------------------------------------------------------------------
  # Backend — FastAPI
  # -------------------------------------------------------------------------
  - type: web
    name: petdogs-backend
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: petdogs-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: '["https://hispike.in","https://www.hispike.in"]'
      - key: ENVIRONMENT
        value: production
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""

  # -------------------------------------------------------------------------
  # Frontend — React (Static Site)
  # -------------------------------------------------------------------------
  - type: web
    name: petdogs-frontend
    env: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_USE_MOCK
        value: "false"
      - key: VITE_API_URL
        sync: false
    # Pre-rendered static pages (vite-react-ssg with dirStyle: nested) live at
    # /<route>/index.html. Map clean URLs to those files BEFORE the SPA catch-all
    # so corporate URL classifiers (Zscaler, BlueCoat, etc.) get the real
    # pre-rendered HTML instead of the SPA shell from /index.html.
    routes:
      - type: rewrite
        source: /dogs
        destination: /dogs/index.html
      - type: rewrite
        source: /swimming
        destination: /swimming/index.html
      - type: rewrite
        source: /hospital
        destination: /hospital/index.html
      - type: rewrite
        source: /park
        destination: /park/index.html
      - type: rewrite
        source: /grooming
        destination: /grooming/index.html
      - type: rewrite
        source: /pet-supplies
        destination: /pet-supplies/index.html
      - type: rewrite
        source: /adoptions
        destination: /adoptions/index.html
      - type: rewrite
        source: /login
        destination: /login/index.html
      - type: rewrite
        source: /register
        destination: /register/index.html
      # SPA fallback for everything else (dynamic routes, protected routes,
      # 404s — React Router handles them client-side).
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
