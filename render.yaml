databases:
  - name: petdogs-db
    databaseName: petdogs
    user: petdogs
    # Basic-256mb (paid): always-on, persistent, daily backups. The free tier
    # expires after ~30 days, so a live DB must be on a paid plan.
    plan: basic_256mb

services:
  # -------------------------------------------------------------------------
  # Backend — FastAPI
  # -------------------------------------------------------------------------
  - type: web
    name: petdogs-backend
    runtime: python
    # Starter (paid) keeps the API always-on — free instances spin down after
    # ~15 min idle and cold-start 30–60s on the next request.
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: petdogs-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: '["https://hispike.in","https://www.hispike.in"]'
      - key: ENVIRONMENT
        value: production
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      # Bootstrap admin (read by scripts/bootstrap_admin.py on every boot).
      # Set both in the Render dashboard — leaving them blank is a no-op.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # -------------------------------------------------------------------------
  # Frontend — React (Static Site)
  # -------------------------------------------------------------------------
  - type: web
    name: petdogs-frontend
    env: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_USE_MOCK
        value: "false"
      - key: VITE_API_URL
        sync: false
    # Pre-rendered static pages (vite-react-ssg with dirStyle: nested) live at
    # /<route>/index.html. Map clean URLs to those files BEFORE the SPA catch-all
    # so corporate URL classifiers (Zscaler, BlueCoat, etc.) get the real
    # pre-rendered HTML instead of the SPA shell from /index.html.
    routes:
      - type: rewrite
        source: /dogs
        destination: /dogs/index.html
      - type: rewrite
        source: /swimming
        destination: /swimming/index.html
      - type: rewrite
        source: /hospital
        destination: /hospital/index.html
      - type: rewrite
        source: /park
        destination: /park/index.html
      - type: rewrite
        source: /grooming
        destination: /grooming/index.html
      - type: rewrite
        source: /pet-supplies
        destination: /pet-supplies/index.html
      - type: rewrite
        source: /adoptions
        destination: /adoptions/index.html
      - type: rewrite
        source: /login
        destination: /login/index.html
      - type: rewrite
        source: /register
        destination: /register/index.html
      - type: rewrite
        source: /about
        destination: /about/index.html
      - type: rewrite
        source: /newsroom
        destination: /newsroom/index.html
      - type: rewrite
        source: /blog
        destination: /blog/index.html
      - type: rewrite
        source: /careers
        destination: /careers/index.html
      - type: rewrite
        source: /feedback
        destination: /feedback/index.html
      - type: rewrite
        source: /petshops
        destination: /petshops/index.html
      - type: rewrite
        source: /pet-play
        destination: /pet-play/index.html
      # (/dog-walking is a "coming soon" placeholder — intentionally not rewritten
      #  so it isn't indexed until the real page ships.)
      - type: rewrite
        source: /terms
        destination: /terms/index.html
      - type: rewrite
        source: /privacy
        destination: /privacy/index.html
      # Blog articles are pre-rendered to nested dirs (/blog/<slug>/index.html).
      # A clean URL like /blog/foo (no trailing slash) has no file of its own, so
      # without this rule it falls through to the SPA catch-all and serves the
      # homepage shell — crawlers then index homepage content for every article.
      # This wildcard maps /blog/<slug> -> /blog/<slug>/index.html and covers
      # future articles automatically. Must come BEFORE the /* catch-all.
      - type: rewrite
        source: /blog/*
        destination: /blog/*/index.html
      # SPA fallback for everything else (dynamic routes, protected routes,
      # 404s — React Router handles them client-side).
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
