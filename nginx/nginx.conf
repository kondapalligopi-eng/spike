worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # Allow large uploads (e.g. dog profile images)
    client_max_body_size 20m;

    # -------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # -------------------------------------------------------------------
    # HTTP — redirect everything to HTTPS
    # -------------------------------------------------------------------
    server {
        listen 80;
        server_name hispike.in www.hispike.in;

        # Allow Let's Encrypt / ACME challenges through before redirecting
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # -------------------------------------------------------------------
    # HTTPS — production server
    # -------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name hispike.in www.hispike.in;

        # SSL certificates (mount ./nginx/ssl → /etc/nginx/ssl in compose)
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # HSTS — 6 months, no preload.
        # Corporate proxies (Zscaler, Netskope, etc.) re-sign TLS with their own CA.
        # `preload` would make browsers reject that cert with no user bypass, locking
        # out enterprise users. Keep HSTS for the security benefit, but leave the
        # preload opt-in off unless we explicitly submit to hstspreload.org.
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # -------------------------------------------------------------------
        # Security headers
        # -------------------------------------------------------------------
        add_header X-Frame-Options           "SAMEORIGIN"                          always;
        add_header X-XSS-Protection          "1; mode=block"                       always;
        add_header X-Content-Type-Options    "nosniff"                             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline'; \
             style-src 'self' 'unsafe-inline'; \
             font-src 'self' data:; \
             img-src 'self' data: https://res.cloudinary.com; \
             connect-src 'self'; \
             frame-ancestors 'none';"
            always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # -------------------------------------------------------------------
        # Health check
        # -------------------------------------------------------------------
        location /health {
            proxy_pass         http://backend/health;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------------------------------
        # API — proxy to FastAPI backend
        # -------------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Buffer settings for API responses
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # -------------------------------------------------------------------
        # Static assets — long-lived cache (React build output)
        # -------------------------------------------------------------------
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;
        }

        # -------------------------------------------------------------------
        # React SPA — serve index.html for all unmatched routes
        # -------------------------------------------------------------------
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # HTML itself should not be cached so new deploys take effect
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}
