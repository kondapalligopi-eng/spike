<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      <title>, <meta name="description">, canonical URL, and the per-page
      og:/twitter: tags are owned by <PageHead> (src/components/PageHead.tsx)
      via vite-react-ssg's <Head>. Each route sets its own — keeping them
      out of this template avoids the SSR-injected Helmet tags being shadowed
      by static ones later in the document.
    -->
    <meta name="keywords" content="pet care, dog care, dog grooming, veterinarian, dog park, dog swimming, pet supplies, Bengaluru, India, dogs, HiSpike" />
    <meta name="author" content="HiSpike" />
    <meta name="application-name" content="HiSpike" />
    <meta name="apple-mobile-web-app-title" content="HiSpike" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!--
      Search-engine verification meta tags. Replace the placeholder values with the
      verification tokens issued by each console once the domain is verified:
        Google Search Console:   https://search.google.com/search-console
        Bing Webmaster Tools:    https://www.bing.com/webmasters
        Yandex Webmaster:        https://webmaster.yandex.com/
      These are picked up by enterprise URL reputation engines (Zscaler, BlueCoat,
      Symantec, Forcepoint, etc.) as legitimacy signals. Leave the lines commented
      out until you have real values; an empty content attribute is a worse signal
      than the absence of the tag.
    -->
    <!-- <meta name="google-site-verification" content="REPLACE_WITH_GOOGLE_TOKEN" /> -->
    <!-- <meta name="msvalidate.01" content="REPLACE_WITH_BING_TOKEN" /> -->
    <!-- <meta name="yandex-verification" content="REPLACE_WITH_YANDEX_TOKEN" /> -->

    <meta name="theme-color" content="#0ea5e9" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="icon" type="image/png" href="/logo.png?v=2" />
    <link rel="apple-touch-icon" href="/logo.png?v=2" />

    <!-- og:type / og:image / twitter:card / twitter:image are site-wide
         constants. og:title / og:description / og:url / twitter:title /
         twitter:description / twitter:url are set per-page by <PageHead>. -->
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://hispike.in/logo.png?v=2" />
    <meta property="og:image:alt" content="HiSpike logo" />
    <meta property="og:site_name" content="HiSpike" />
    <meta property="og:locale" content="en_IN" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://hispike.in/logo.png?v=2" />
    <meta name="twitter:image:alt" content="HiSpike logo" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "HiSpike",
      "alternateName": "HiSpike Pet Care",
      "url": "https://hispike.in/",
      "description": "All-in-one pet care for dogs in Bengaluru — vets, dog parks, swim lessons, grooming, and pet supplies."
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Brand",
      "name": "HiSpike",
      "alternateName": "HiSpike Pet Care",
      "url": "https://hispike.in/",
      "logo": "https://hispike.in/logo.png?v=2"
    }
    </script>
    <!--
      Brand-entity signal — Organization schema is one of the strongest
      ways to teach Google that "HiSpike" is a distinct business entity
      (and improve branded-query ranking like searching just "hispike").

      ⚠ TO COMPLETE: once Facebook / Instagram / LinkedIn / X (Twitter) /
      YouTube pages exist for HiSpike, add their URLs to the `sameAs`
      array below. `sameAs` is the single most important field for Google
      linking the brand name to verified profiles across the web. Use the
      EXACT profile URLs (e.g. "https://www.instagram.com/hispike/"), not
      placeholders or 404s — fake URLs in sameAs hurt more than help.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "HiSpike",
      "legalName": "HiSpike",
      "alternateName": "HiSpike Pet Care",
      "url": "https://hispike.in/",
      "logo": "https://hispike.in/logo.png?v=2",
      "foundingDate": "2026",
      "slogan": "All-in-one pet care for dogs in Bengaluru",
      "brand": {
        "@type": "Brand",
        "name": "HiSpike"
      },
      "description": "All-in-one pet care platform for dogs offering veterinary care, dog parks, swimming lessons, grooming, and premium pet supplies in Bengaluru, India.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Bengaluru",
        "addressRegion": "Karnataka",
        "addressCountry": "IN"
      },
      "areaServed": {
        "@type": "City",
        "name": "Bengaluru"
      },
      "sameAs": [],
      "contactPoint": [
        {
          "@type": "ContactPoint",
          "email": "support@hispike.in",
          "contactType": "customer service",
          "areaServed": "IN",
          "availableLanguage": ["English", "Kannada", "Hindi", "Telugu"]
        }
      ]
    }
    </script>

    <!--
      Per-service schema — tells Google "HiSpike offers these 5 services in
      Bengaluru" so the service pages are eligible for richer SERP treatment
      (sitelinks, knowledge-panel service chips) and have a chance at ranking
      for service-specific local queries like "dog grooming bengaluru".
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Service",
          "name": "Vet Hospitals in Bengaluru",
          "serviceType": "Veterinary care",
          "url": "https://hispike.in/hospital",
          "provider": { "@type": "Organization", "name": "HiSpike", "url": "https://hispike.in/" },
          "areaServed": { "@type": "City", "name": "Bengaluru" },
          "description": "Verified veterinary hospitals and 24×7 emergency pet clinics across Bengaluru — Indiranagar, Koramangala, Whitefield, HSR Layout, Jayanagar, Domlur."
        },
        {
          "@type": "Service",
          "name": "Dog Parks in Bengaluru",
          "serviceType": "Dog park directory",
          "url": "https://hispike.in/park",
          "provider": { "@type": "Organization", "name": "HiSpike", "url": "https://hispike.in/" },
          "areaServed": { "@type": "City", "name": "Bengaluru" },
          "description": "Best dog-friendly parks across Bengaluru with off-leash zones, walking trails, opening hours and amenities."
        },
        {
          "@type": "Service",
          "name": "Dog Swimming Lessons in Bengaluru",
          "serviceType": "Canine swimming",
          "url": "https://hispike.in/swimming",
          "provider": { "@type": "Organization", "name": "HiSpike", "url": "https://hispike.in/" },
          "areaServed": { "@type": "City", "name": "Bengaluru" },
          "description": "Heated indoor pools and certified canine swim coaches across Bengaluru, including hydrotherapy for senior and post-surgery recovery dogs."
        },
        {
          "@type": "Service",
          "name": "Pet Grooming Salons in Bengaluru",
          "serviceType": "Pet grooming",
          "url": "https://hispike.in/grooming",
          "provider": { "@type": "Organization", "name": "HiSpike", "url": "https://hispike.in/" },
          "areaServed": { "@type": "City", "name": "Bengaluru" },
          "description": "Verified dog grooming salons across Bengaluru offering bath & full groom, walk-in touch-ups and breed-specific styling."
        },
        {
          "@type": "Service",
          "name": "Pet Supplies & Dog Food in Bengaluru",
          "serviceType": "Pet supplies retail",
          "url": "https://hispike.in/pet-supplies",
          "provider": { "@type": "Organization", "name": "HiSpike", "url": "https://hispike.in/" },
          "areaServed": { "@type": "City", "name": "Bengaluru" },
          "description": "Premium dog food, treats and pet supplies — Royal Canin, Pedigree, ACANA — across dry, wet, veterinary and life-stage-specific diets."
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <header>
        <h1>HiSpike — All-In-One Pet Care for Dogs in Bengaluru</h1>
        <p>HiSpike is a pet care platform for dog owners in Bengaluru, India. Find trusted veterinarians, dog parks, swim lessons, grooming salons, and premium pet supplies — all in one place.</p>
      </header>
      <main>
        <section>
          <h2>Our Services</h2>
          <ul>
            <li><a href="/hospital">Veterinary Hospitals</a> — find trusted clinics in Bengaluru for routine checkups, vaccinations, dental care, and emergencies. Browse vet profiles, consultation hours, and book visits.</li>
            <li><a href="/park">Dog Parks</a> — discover safe, off-leash dog parks and outdoor play spaces across Bengaluru, including Cubbon Park, Lalbagh, and neighbourhood parks in Whitefield, Indiranagar, Koramangala, HSR Layout, and Jayanagar.</li>
            <li><a href="/swimming">Swim Lessons</a> — book guided swimming sessions and water-safety classes for dogs of all ages and breeds. Suitable for puppies, adult dogs, and seniors needing low-impact exercise.</li>
            <li><a href="/grooming">Grooming Salons</a> — professional bathing, fur trimming, nail care, ear cleaning, de-shedding treatments, and breed-specific styling at vetted salons across the city.</li>
            <li><a href="/pet-supplies">Pet Supplies</a> — premium food, treats, toys, leashes, beds, crates, and grooming accessories from trusted Indian and international brands.</li>
            <li><a href="/dogs">Dog Profiles</a> — browse breed-specific care information, common health concerns, and tips for first-time dog owners.</li>
            <li><a href="/adoptions">Adoptions</a> — meet dogs looking for forever homes from local shelters and partner rescue organisations.</li>
          </ul>
        </section>
        <section>
          <h2>About HiSpike</h2>
          <p>HiSpike is a Bengaluru-based pet care platform that brings together everything dog owners need in one place. We help families across Bengaluru — including Whitefield, Indiranagar, Koramangala, HSR Layout, Jayanagar, BTM Layout, Marathahalli, and Electronic City — find vetted local services and connect with a community of responsible pet owners. Our directory covers small dogs, large breeds, puppies, and senior dogs, and we partner only with vets, salons, and trainers who meet our quality standards.</p>
        </section>
        <section>
          <h2>Why dog owners choose HiSpike</h2>
          <ul>
            <li>Verified service providers — every vet, salon, and trainer is vetted before listing.</li>
            <li>One platform for every need — vets, parks, swimming, grooming, supplies, and adoption.</li>
            <li>Local focus — built for Bengaluru, with hyperlocal recommendations.</li>
            <li>Transparent reviews from real dog owners.</li>
          </ul>
        </section>
        <section>
          <h2>Contact</h2>
          <p>Email us at <a href="mailto:support@hispike.in">support@hispike.in</a> — we usually reply within a day.</p>
        </section>
        <p><strong>Please enable JavaScript</strong> to use HiSpike's interactive booking and account features.</p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
