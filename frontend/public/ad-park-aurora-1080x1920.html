<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HiSpike — Dog Parks Ad (1080×1920)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">
  <style>
    :root { --primary-900:#1e3a8a; --primary-800:#1e40af; --primary-600:#2563eb; --accent-400:#facc15; --accent-300:#fde047; --warm-900:#1c1917; }
    html,body { margin:0; padding:0; background:#111; font-family:'Inter',system-ui,sans-serif; color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .stage { width:1080px; height:1920px; position:relative; overflow:hidden; background:linear-gradient(160deg,#3b0764 0%,#5b21b6 35%,#1e40af 70%,#0ea5e9 100%); box-shadow:0 30px 80px rgba(0,0,0,.5); }
    .blob { position:absolute; border-radius:50%; filter:blur(135px); }
    .paws { position:absolute; inset:0; pointer-events:none; }
    .paw { position:absolute; }
    .paw svg { width:100%; height:100%; display:block; opacity:.13; animation:paw-pulse 2.6s ease-in-out infinite; }
    @keyframes paw-pulse { 0%,100%{opacity:.08} 50%{opacity:.20} }
    @keyframes sparkle { 0%,100%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(0)} 45%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(25deg)} 55%{opacity:.9;transform:translate(-50%,-50%) scale(1.1) rotate(30deg)} }
    .sparkle { position:absolute; opacity:.6; animation:sparkle 2.2s ease-in-out infinite; filter:drop-shadow(0 0 5px rgba(255,255,255,.9)); }
    @media (prefers-reduced-motion:reduce){ .paw svg,.sparkle{animation:none!important} }
    .glow { position:absolute; width:900px; height:900px; right:-250px; bottom:-300px; border-radius:50%; background:radial-gradient(closest-side,rgba(250,204,21,.30),rgba(250,204,21,0)); filter:blur(12px); }

    .header { position:absolute; top:200px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:22px; }
    .logo { width:150px; height:150px; filter:drop-shadow(0 10px 22px rgba(0,0,0,.32)); }
    .pill { background:rgba(255,255,255,.14); color:#fff; font-size:18px; font-weight:700; letter-spacing:.34em; text-transform:uppercase; padding:12px 26px; border-radius:999px; border:1px solid rgba(255,255,255,.22); }

    .mid { position:absolute; top:52%; left:80px; right:80px; transform:translateY(-50%); text-align:center; display:flex; flex-direction:column; align-items:center; }
    .bubble { position:relative; width:300px; height:300px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:150px; line-height:1; box-shadow:0 26px 54px rgba(0,0,0,.32); }
    .bubble.hospital { background:linear-gradient(135deg,#fecdd3,#fb7185); }
    .bubble.park     { background:linear-gradient(135deg,#a7f3d0,#10b981); }
    .bubble.swim     { background:linear-gradient(135deg,#bae6fd,#0ea5e9); }
    .bubble.grooming { background:linear-gradient(135deg,#fde68a,#fbbf24); }
    .bubble.stories  { background:linear-gradient(135deg,#f5d0fe,#d946ef); }
    .badge { position:absolute; right:2px; bottom:2px; width:92px; height:92px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; font-size:44px; box-shadow:0 8px 18px rgba(0,0,0,.26); border:3px solid rgba(255,255,255,.95); }
    .eyebrow { color:var(--accent-300); font-size:24px; font-weight:800; letter-spacing:.40em; text-transform:uppercase; margin:64px 0 22px; }
    h1 { font-weight:900; font-size:92px; line-height:1.05; letter-spacing:-.025em; margin:0 0 26px; }
    h1 .yellow { color:var(--accent-300); }
    .sub { font-size:30px; line-height:1.42; color:rgba(255,255,255,.92); margin:0 auto; max-width:840px; }
    .underline { width:140px; height:6px; background:var(--accent-400); border-radius:999px; margin:34px auto 0; }

    .footer { position:absolute; bottom:250px; left:80px; right:80px; display:flex; flex-direction:column; align-items:center; gap:20px; }
    .cta { background:var(--accent-400); color:var(--warm-900); font-weight:900; font-size:36px; letter-spacing:.03em; padding:28px 58px; border-radius:999px; white-space:nowrap; box-shadow:0 18px 36px rgba(250,204,21,.40); display:inline-flex; align-items:center; gap:16px; }
    .path { color:rgba(255,255,255,.82); font-size:24px; font-weight:700; letter-spacing:.06em; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="paws" aria-hidden="true">
      
      <div class="blob" style="width:720px;height:720px;left:36%;top:-170px;background:#a855f7;opacity:.42"></div>
      <div class="blob" style="width:640px;height:640px;right:-140px;bottom:-120px;background:#22d3ee;opacity:.38"></div>
      <div class="blob" style="width:520px;height:520px;left:-150px;top:230px;background:#10b981;opacity:.30"></div>
      <svg class="sparkle" style="top:180px;left:200px;width:30px;height:30px;animation-delay:0.3s" viewBox="0 0 10 10"><path d="M5 0 L5.9 4.1 L10 5 L5.9 5.9 L5 10 L4.1 5.9 L0 5 L4.1 4.1 Z" fill="white"/></svg>
      <svg class="sparkle" style="top:230px;left:860px;width:24px;height:24px;animation-delay:1.1s" viewBox="0 0 10 10"><path d="M5 0 L5.9 4.1 L10 5 L5.9 5.9 L5 10 L4.1 5.9 L0 5 L4.1 4.1 Z" fill="white"/></svg>
      <svg class="sparkle" style="top:600px;left:100px;width:22px;height:22px;animation-delay:0.7s" viewBox="0 0 10 10"><path d="M5 0 L5.9 4.1 L10 5 L5.9 5.9 L5 10 L4.1 5.9 L0 5 L4.1 4.1 Z" fill="white"/></svg>
      <svg class="sparkle" style="top:1660px;left:180px;width:28px;height:28px;animation-delay:0.9s" viewBox="0 0 10 10"><path d="M5 0 L5.9 4.1 L10 5 L5.9 5.9 L5 10 L4.1 5.9 L0 5 L4.1 4.1 Z" fill="white"/></svg>
      <svg class="sparkle" style="top:1700px;left:850px;width:24px;height:24px;animation-delay:1.7s" viewBox="0 0 10 10"><path d="M5 0 L5.9 4.1 L10 5 L5.9 5.9 L5 10 L4.1 5.9 L0 5 L4.1 4.1 Z" fill="white"/></svg>
      <svg class="sparkle" style="top:1870px;left:520px;width:22px;height:22px;animation-delay:0.4s" viewBox="0 0 10 10"><path d="M5 0 L5.9 4.1 L10 5 L5.9 5.9 L5 10 L4.1 5.9 L0 5 L4.1 4.1 Z" fill="white"/></svg>
    </div>

    <div class="header">
      <img src="./logo.png?v=2" alt="HiSpike" class="logo" />
      <div class="pill">Bengaluru</div>
    </div>

    <div class="mid">
      <div class="bubble park">🐕<div class="badge">🌳</div></div>
      <div class="eyebrow">Dog Parks & Outdoors</div>
      <h1>Room to <span class="yellow">run</span>,<br/>play &amp; sniff.</h1>
      <p class="sub">Discover safe, off-leash dog parks near you in Bengaluru — timings, entry &amp; the vibe.</p>
      <div class="underline"></div>
    </div>

    <div class="footer">
      <div class="cta">Visit hispike.in →</div>
      <div class="path">hispike.in/park</div>
    </div>
  </div>
  <button id="hispike-download-btn" type="button"
    style="position:fixed;bottom:24px;right:24px;z-index:9999;padding:14px 22px;border:0;border-radius:999px;background:#facc15;color:#1c1917;font:700 14px/1 Inter,system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 14px 30px rgba(0,0,0,.35);cursor:pointer;">📥 Download PNG</button>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    document.getElementById('hispike-download-btn').addEventListener('click', async function(){
      const btn=this, stage=document.querySelector('.stage'); if(!stage) return;
      const original=btn.textContent; btn.textContent='Rendering…'; btn.disabled=true;
      try {
        if(document.fonts&&document.fonts.ready) await document.fonts.ready;
        const w=stage.offsetWidth, h=stage.offsetHeight;
        const canvas=await html2canvas(stage,{backgroundColor:'#3b0764',scale:1,useCORS:true,allowTaint:false,width:w,height:h,windowWidth:w,windowHeight:h});
        const link=document.createElement('a'); link.download='hispike-ad-park-aurora.png'; link.href=canvas.toDataURL('image/png');
        document.body.appendChild(link); link.click(); link.remove();
      } catch(e){ alert('Could not generate the PNG: '+e.message); }
      finally { btn.textContent=original; btn.disabled=false; }
    });
  </script>
</body>
</html>
