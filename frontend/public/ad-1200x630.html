<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HiSpike — Link Preview Banner (1200×630)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">
  <style>
    :root {
      --primary-900: #1e3a8a;
      --primary-800: #1e40af;
      --primary-600: #2563eb;
      --accent-400: #facc15;
      --accent-300: #fde047;
      --warm-900: #1c1917;
    }
    html, body {
      margin: 0; padding: 0; background: #111;
      font-family: 'Inter', system-ui, sans-serif;
      color: #fff; display: flex; align-items: center;
      justify-content: center; min-height: 100vh;
    }
    .stage {
      width: 1200px; height: 630px; position: relative; overflow: hidden;
      background: linear-gradient(135deg,
        var(--primary-900) 0%, var(--primary-800) 50%, var(--primary-600) 100%);
      box-shadow: 0 30px 80px rgba(0,0,0,.5);
    }
    .pattern {
      position: absolute; inset: 0; opacity: 0.10;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 60 60'><g fill='white'><path d='M14 18a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm18 0a3 3 0 1 1 0 6 3 3 0 0 1 0-6zM18 8a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm10 0a3 3 0 1 1 0 6 3 3 0 0 1 0-6zm-5 10a6 6 0 0 0-5.3 8.9l-.5 3.3c-.2 1.4.9 2.6 2.3 2.6h7a2.3 2.3 0 0 0 2.3-2.6l-.5-3.3A6 6 0 0 0 23 18z'/></g></svg>");
      background-size: 140px 140px;
    }
    .glow {
      position: absolute; width: 540px; height: 540px;
      right: -180px; bottom: -200px; border-radius: 50%;
      background: radial-gradient(closest-side, rgba(250,204,21,.28), rgba(250,204,21,0));
      filter: blur(8px);
    }

    /* Header */
    .header {
      position: absolute; top: 36px; left: 48px; right: 48px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { width: 76px; height: 76px; filter: drop-shadow(0 6px 14px rgba(0,0,0,.28)); }
    .pill {
      background: rgba(255,255,255,.14); color: #fff;
      font-size: 12px; font-weight: 700; letter-spacing: 0.30em;
      text-transform: uppercase; padding: 9px 16px;
      border-radius: 999px; border: 1px solid rgba(255,255,255,.22);
    }

    /* Left: copy block */
    .main {
      position: absolute; top: 150px; left: 48px;
      max-width: 720px;
    }
    .eyebrow {
      color: var(--accent-300); font-size: 14px; font-weight: 800;
      letter-spacing: 0.36em; text-transform: uppercase; margin-bottom: 14px;
    }
    h1 {
      font-weight: 900; font-size: 64px; line-height: 1.03;
      letter-spacing: -0.025em; margin: 0 0 16px 0;
    }
    h1 .yellow { color: var(--accent-300); }
    .sub {
      font-size: 19px; line-height: 1.4;
      color: rgba(255,255,255,.92); margin: 0; max-width: 620px;
    }
    .underline {
      width: 100px; height: 5px; background: var(--accent-400);
      border-radius: 999px; margin: 16px 0 0 0;
    }

    /* Right: service circles stacked vertically */
    .services {
      position: absolute; top: 150px; right: 48px;
      display: grid; grid-template-columns: repeat(2, auto); gap: 14px 18px;
      justify-items: center;
    }
    .svc { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .svc .bubble {
      position: relative; width: 78px; height: 78px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; line-height: 1;
      box-shadow: 0 10px 22px rgba(0,0,0,.24);
    }
    .svc .bubble.hospital { background: linear-gradient(135deg, #fecdd3, #fb7185); }
    .svc .bubble.park     { background: linear-gradient(135deg, #a7f3d0, #10b981); }
    .svc .bubble.swim     { background: linear-gradient(135deg, #bae6fd, #0ea5e9); }
    .svc .bubble.grooming { background: linear-gradient(135deg, #fde68a, #fbbf24); }
    .svc .bubble.supplies { background: linear-gradient(135deg, #ddd6fe, #a78bfa); }
    .svc .badge {
      position: absolute; right: -3px; bottom: -3px;
      width: 26px; height: 26px; border-radius: 50%;
      background: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 13px; box-shadow: 0 3px 8px rgba(0,0,0,.22);
      border: 2px solid rgba(255,255,255,.95);
    }
    .svc .label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
      color: rgba(255,255,255,.92); text-align: center;
    }

    /* Footer */
    .footer {
      position: absolute; bottom: 40px; left: 48px; right: 48px;
      display: flex; align-items: center; justify-content: center;
    }
    .cta {
      background: var(--accent-400); color: var(--warm-900);
      font-weight: 900; font-size: 22px; letter-spacing: 0.04em;
      padding: 16px 32px; border-radius: 999px; white-space: nowrap;
      box-shadow: 0 12px 26px rgba(250,204,21,.36);
      display: inline-flex; align-items: center; gap: 12px;
    }
    .city {
      color: rgba(255,255,255,.85); font-size: 12px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase; text-align: right;
      max-width: 460px; line-height: 1.5;
    }
    .city .pin { color: var(--accent-300); margin-right: 5px; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="pattern"></div>
    <div class="glow"></div>

    <div class="header">
      <img src="./logo.png?v=2" alt="HiSpike" class="logo" />
      <div class="pill">Bengaluru</div>
    </div>

    <div class="main">
      <div class="eyebrow">All-In-One Pet Care</div>
      <h1>Everything your <span class="yellow">dog</span> needs.<br/>One platform.</h1>
      <p class="sub">Vets, dog parks, swim lessons, grooming, and premium pet supplies — verified, local to Bengaluru, just a tap away.</p>
      <div class="underline"></div>
    </div>

    <div class="services">
      <div class="svc"><div class="bubble hospital">🐶<div class="badge">🩺</div></div><div class="label">Hospital</div></div>
      <div class="svc"><div class="bubble park">🐕<div class="badge">🌳</div></div><div class="label">Park</div></div>
      <div class="svc"><div class="bubble swim">🐶<div class="badge">🌊</div></div><div class="label">Swimming</div></div>
      <div class="svc"><div class="bubble grooming">🐩<div class="badge">✂️</div></div><div class="label">Grooming</div></div>
      <div class="svc" style="grid-column: span 2;"><div class="bubble supplies">🐶<div class="badge">🥣</div></div><div class="label">Pet Supplies</div></div>
    </div>

    <div class="footer">
      <div class="cta">Visit hispike.in →</div>
    </div>
  </div>
  <button
    id="hispike-download-btn"
    type="button"
    style="position:fixed;bottom:24px;right:24px;z-index:9999;padding:14px 22px;border:0;border-radius:999px;background:#facc15;color:#1c1917;font:700 14px/1 Inter,system-ui,sans-serif;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 14px 30px rgba(0,0,0,.35);cursor:pointer;"
  >📥 Download PNG</button>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    document.getElementById('hispike-download-btn').addEventListener('click', async function () {
      const btn = this;
      const stage = document.querySelector('.stage');
      if (!stage) return;
      const original = btn.textContent;
      btn.textContent = 'Rendering…';
      btn.disabled = true;
      try {
        if (document.fonts && document.fonts.ready) await document.fonts.ready;
        const canvas = await html2canvas(stage, {
          backgroundColor: null, scale: 1, useCORS: true, allowTaint: false,
        });
        const link = document.createElement('a');
        link.download = 'hispike-ad-1200x630.png';
        link.href = canvas.toDataURL('image/png');
        document.body.appendChild(link); link.click(); link.remove();
      } catch (e) {
        alert('Could not generate the PNG: ' + e.message);
      } finally {
        btn.textContent = original; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
